<nav class="navbar" [class.scrolled]="scrolled">
  <div class="nav-container">
    <!-- Contenedor izquierdo: logo o hamburguesa según scroll y tamaño -->
    <div class="left-container">
      <!-- En móvil: logo si no hay scroll, hamburguesa si hay scroll -->
      <ng-container *ngIf="isMobile">
        <div class="logo" *ngIf="!scrolled">
          <img src="logo.png" alt="Logo">
        </div>
        <div class="hamburger" *ngIf="scrolled" (click)="toggleMenu()" [class.active]="isMenuOpen">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </div>
      </ng-container>
      <!-- En escritorio: siempre el logo -->
      <div class="logo" *ngIf="!isMobile">
        <img src="logo.png" alt="Logo">
      </div>
    </div>

    <!-- Menú de navegación (overlay) -->
    <div class="nav-menu" [class.active]="isMenuOpen">
      <ul class="nav-links">
        <li><a (click)="scrollTo('home')">Home</a></li>
        <li><a (click)="scrollTo('services')">Services</a></li>
        <li class="hide-on-mobile"><a (click)="scrollTo('about')">About</a></li>
        <li><a (click)="scrollTo('contact')">Contact us</a></li>
      </ul>
    </div>

    <!-- Botón Get Started -->
    <button class="btn-get-started" (click)="scrollTo('contact')">Get Started</button>
  </div>
</nav>
